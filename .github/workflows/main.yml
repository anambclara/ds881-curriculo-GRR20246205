title: Curriculo - Ana Clara Martins Batista
email: anaclaramartinsbatista2006@gmail.com
description: Curriculo profissional e portfolio de Ana Clara Martins Batista.
baseurl: "/ds881-curriculo-GRR20246205"
url: "https://anambclara.github.io/"
github_username: anambclara

source: src
destination: _site

theme: minima
plugins:
  
jekyll-feed
name: CI/CD

on:
  push:
    branches:
      
main
pull_request:
  branches:
main

permissions:
  contents: read

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      
name: Checkout
      uses: actions/checkout@v6

      
name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: "3.2"
        bundler-cache: true

      
name: Static analysis
      run: bundle exec jekyll doctor

      
name: Configure GitHub Pages
      if: github.event_name == 'push'
      uses: actions/configure-pages@v5

      
name: Build site
      run: bundle exec jekyll build --trace

      
name: Upload GitHub Pages artifact
      if: github.event_name == 'push'
      uses: actions/upload-pages-artifact@v4
      with:
        path: ./_site

  deploy:
    if: github.event_name == 'push'
    needs: lint-and-build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      
name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4